{% extends "base.html" %}
{% block content %}

<h2>Índice Interanual por Mes</h2>

<style>

.contenedor {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

/* línea única de controles */
.fila-controles {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 15px;
}

.grupo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.checkbox-anio {
    margin-right: 6px;
}

select {
    padding: 4px 6px;
    font-size: 14px;
}

button {
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
}

</style>


<div class="contenedor">

<form method="get">

<div class="fila-controles">

    <!-- AÑOS -->
    <div class="grupo">
        <strong>Años:</strong>

        {% for anio in anios_disponibles %}

        <label class="checkbox-anio">

        <input type="checkbox"
               name="anio"
               value="{{ anio }}"
               {% if anio in anios_seleccionados %}checked{% endif %}>

        {{ anio }}

        </label>

        {% endfor %}
    </div>


    <!-- AÑO BASE -->
    <div class="grupo">

        <strong>Año base:</strong>

        <select name="anio_base">

        {% for anio in anios_disponibles %}

        <option value="{{ anio }}"
        {% if anio == anio_base %}selected{% endif %}>
        {{ anio }}
        </option>

        {% endfor %}

        </select>

    </div>


    <!-- BOTÓN -->
    <div class="grupo">
        <button type="submit">Actualizar</button>
    </div>

</div>

</form>


{% if grafico %}

<img src="data:image/png;base64,{{ grafico }}"
     style="width:100%; max-width:1200px;">

{% else %}

<p>No hay datos disponibles.</p>

{% endif %}

</div>

{% endblock %}
