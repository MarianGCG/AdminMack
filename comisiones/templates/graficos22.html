{% extends "base.html" %}
{% load l10n %}
{% block content %}

<h3 style="margin:4px 0 6px 0;">Facturación trimestral en USD</h3>

<form method="get"
      style="margin:0 0 6px 0;
             display:flex;
             align-items:center;
             gap:14px;
             flex-wrap:wrap;
             font-size:14px;">

    <span><b>Top:</b></span>
    <input type="number"
           name="top"
           min="1"
           value="{{ top_n }}"
           style="width:55px;">

    <span><b>Tope %:</b></span>
    <input type="number"
           step="0.1"
           min="0"
           max="100"
           name="tope"
           value="{{ tope|unlocalize }}"
           style="width:65px;">

    <span><b>Años:</b></span>

    {% for anio in anios_disponibles %}
        <label>
            <input type="checkbox"
                   name="anio"
                   value="{{ anio|unlocalize }}"
                   {% if anio in anios_seleccionados %}checked{% endif %}>
            {{ anio|unlocalize }}
        </label>
    {% endfor %}

    <button type="submit"
            style="padding:3px 10px;
                   background:#2c78be;
                   color:white;
                   border:none;
                   border-radius:4px;">
        Actualizar
    </button>

</form>


<div style="height: calc(100vh - 140px); width: 100%;">
    <canvas id="graficos22"></canvas>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<script>

// ===============================
// Plugin líneas cambio de año
// ===============================

const lineasCambioAnio = {

    id: 'lineasCambioAnio',

    afterDraw(chart) {

        const {ctx, chartArea: {top, bottom}, scales: {x}} = chart;

        ctx.save();

        const labels = chart.data.labels;

        for (let i = 1; i < labels.length; i++) {

            const anioActual = labels[i].split('-')[0];
            const anioAnterior = labels[i-1].split('-')[0];

            if (anioActual !== anioAnterior) {

                const xActual = x.getPixelForValue(i);
                const xAnterior = x.getPixelForValue(i-1);
                const xPos = (xActual + xAnterior) / 2;

                ctx.beginPath();
                ctx.moveTo(xPos, top);
                ctx.lineTo(xPos, bottom);
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = '#888';
                ctx.setLineDash([6,6]);
                ctx.stroke();
            }
        }

        ctx.restore();
    }
};


// ===============================
// Registrar plugins
// ===============================

Chart.register(ChartDataLabels, lineasCambioAnio);


// ===============================
// Datos desde Django
// ===============================

const labels = {{ labels|safe }};
const datasets = {{ datasets|safe }};
const totales = {{ totales|safe }};


// ===============================
// Crear gráfico
// ===============================

new Chart(document.getElementById('graficos22'), {

    type: 'bar',

    data: {
        labels: labels,
        datasets: datasets
    },

    options: {

        maintainAspectRatio: false,
        responsive: true,

        scales: {
            x: { stacked: true },
            y: { stacked: true }
        },

        plugins: {

            legend: { display:false },

            datalabels: {

                color: 'white',

                font: {
                    weight:'bold',
                    size:11
                },

                textAlign: 'center',
                anchor: 'center',
                align: 'center',

                formatter: function(value, context) {

                    if (!value) return "";

                    const nombre =
                        context.dataset.labels[context.dataIndex];

                    const total =
                        totales[context.dataIndex];

                    const pct =
                        Math.round(value / total * 100);

                    // FORMATO EN UNA SOLA LINEA
                    return pct + "% " + nombre;
                }
            }
        }
    }
});

</script>

{% endblock %}
