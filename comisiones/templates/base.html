<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Mack</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* NAVBAR FIJO */
        .navbar {
            background-color: #174a7c;
            padding: 10px 25px;
            display: flex;
            gap: 25px;
            align-items: center;

            position: sticky;
            top: 0;
            z-index: 1000;

            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .navbar a:hover {
            opacity: 0.8;
        }

        /* CONTENIDO NORMAL */
        .contenido {
            padding: 10px 20px 15px 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* CONTENIDO FULL WIDTH (para gráficos grandes) */
        .contenido.fullwidth {
            max-width: 100%;
        }

        /* TITULOS DE GRAFICOS */
        .titulo-grafico {
            font-size: 22px;
            font-weight: bold;
            color: #174a7c;
            margin-bottom: 10px;
        }

        /* BARRA DE OPCIONES */
        .barra-opciones {
            background-color: white;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* =========================
           TABLAS DE REPORTES
           ========================= */

        .contenedor-tabla {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabla-reporte {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .tabla-reporte th {
            background: #174a7c;
            color: white;
            padding: 6px 8px;
            text-align: left;
            font-weight: bold;
        }

        .tabla-reporte td {
            padding: 5px 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .tabla-reporte tr:last-child td {
            border-bottom: none;
        }

        .tabla-reporte tr:hover {
            background-color: #f5f8fb;
        }

        /* DROPDOWN */
        .dropdown {
            position: relative;
        }

        .dropbtn {
            color: white;
            font-weight: bold;
            text-decoration: none;
            padding: 10px 0;
            display: inline-block;
            font-size: 14px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            min-width: 220px;
            box-shadow: 0px 6px 14px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 1000;
        }

        .dropdown-content a {
            color: #174a7c;
            padding: 10px 14px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #f2f6fa;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

    </style>

</head>
<body>

<div class="navbar">

    <a href="/comprobantes/">Comprobantes</a>
    <a href="/saldos/">Saldos</a>
    <a href="/graficos01/">Evolución USD</a>
    <a href="/graficos22/">Top N Participación</a>
    <a href="/grafico-indice-mensual/">Índice Interanual Mensual</a>

    <div class="dropdown">
        <a href="#" class="dropbtn">Importaciones ▾</a>
        <div class="dropdown-content">
            <a href="{% url 'importar_dolar' %}">Cotizaciones dólar</a>
            <a href="{% url 'aseguradoras' %}">Aseguradoras</a>
            <a href="{% url 'importar_cobranzas' %}">Cobranzas</a>
            <a href="{% url 'importar_comprobantes_arca' %}">Comprobantes ARCA</a>
        </div>
    </div>

    <div class="dropdown">
        <a href="#" class="dropbtn">Sistema ▾</a>
        <div class="dropdown-content">
            <a href="{% url 'parametros' %}">Parámetros</a>
        </div>
    </div>

</div>


<div class="contenido">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
