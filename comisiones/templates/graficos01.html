{% extends "base.html" %}
{% load l10n %}
{% block content %}

<div class="titulo-grafico">
    Evolución Facturación en USD
</div>


<form method="get">

<!-- ========================= -->
<!-- BARRA SUPERIOR -->
<!-- ========================= -->

<div class="barra-opciones">

<b>Periodo:</b>

<label>
<input type="radio" name="tipo" value="mensual"
{% if tipo == "mensual" %}checked{% endif %}>
Mensual
</label>

<label>
<input type="radio" name="tipo" value="trimestral"
{% if tipo == "trimestral" %}checked{% endif %}>
Trimestral
</label>

<label>
<input type="radio" name="tipo" value="anual"
{% if tipo == "anual" %}checked{% endif %}>
Anual
</label>


<span style="border-left:1px solid #ccc;height:20px;"></span>


<b>Modo:</b>

<label>
<input type="radio" name="modo" value="lineas"
{% if modo == "lineas" %}checked{% endif %}>
Líneas
</label>

<label>
<input type="radio" name="modo" value="barras"
{% if modo == "barras" %}checked{% endif %}>
Barras
</label>


<span style="border-left:1px solid #ccc;height:20px;"></span>


<label>
<input type="checkbox"
name="desglose"
value="1"
{% if desglose %}checked{% endif %}>
Desglose aseguradoras
</label>


<button type="submit">Actualizar</button>

</div>


<!-- ========================= -->
<!-- AÑOS -->
<!-- ========================= -->

<div class="barra-opciones">

<b>Años:</b>

{% for anio in anios_disponibles %}

<label>
<input type="checkbox"
name="anio"
value="{{ anio }}"
{% if anio in anios_seleccionados %}checked{% endif %}>
{{ anio }}
</label>

{% endfor %}

</div>

</form>


<!-- ========================= -->
<!-- GRAFICO -->
<!-- ========================= -->

<div style="height: calc(100vh - 170px);">

<canvas id="grafico"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = {{ labels|safe }};
const datasets = {{ datasets|safe }};
const tipo = "{{ tipo }}";
const modo = "{{ modo }}";

let chart = null;


// =============================
// FORMATEAR LABELS
// =============================

function formatearLabel(label,index)
{
    if(tipo==="mensual")
    {
        const [anio,mes]=label.split("-");

        const nombres=[
            "Ene","Feb","Mar","Abr","May","Jun",
            "Jul","Ago","Sep","Oct","Nov","Dic"
        ];

        return nombres[parseInt(mes)-1];
    }

    if(tipo==="trimestral")
    {
        const [anio,t]=label.split("-");
        return t;
    }

    return label;
}


// =============================
// PLUGIN LINEAS CAMBIO AÑO
// =============================

const lineasCambioAnio =
{
    id:"lineasCambioAnio",

    afterDraw(chart)
    {
        const {ctx,chartArea:{top,bottom},scales:{x}}=chart;

        ctx.save();

        ctx.strokeStyle="#999";
        ctx.lineWidth=1;
        ctx.setLineDash([5,5]);

        for(let i=1;i<labels.length;i++)
        {
            const anioActual=labels[i].split("-")[0];
            const anioAnterior=labels[i-1].split("-")[0];

            if(anioActual!==anioAnterior)
            {
                const xPos=(x.getPixelForValue(i)+x.getPixelForValue(i-1))/2;

                ctx.beginPath();
                ctx.moveTo(xPos,top);
                ctx.lineTo(xPos,bottom);
                ctx.stroke();
            }
        }

        ctx.restore();
    }
};

Chart.register(lineasCambioAnio);


// =============================
// CREAR GRAFICO (ROBUSTO)
// =============================

function crearGrafico()
{
    const ctx = document.getElementById("grafico");

    if(chart)
        chart.destroy();

    chart = new Chart(ctx,
    {

        type: modo==="barras" ? "bar" : "line",

        data:
        {
            labels: labels,
            datasets: datasets
        },

        options:
        {

            responsive:true,
            maintainAspectRatio:false,

            interaction:
            {
                mode:"index",
                intersect:false
            },

            plugins:
            {
                legend:
                {
                    display:true
                }
            },

            scales:
            {

                x:
                {
                    ticks:
                    {
                        callback:(value,index)=>
                            formatearLabel(labels[index],index),

                        maxRotation:0,
                        autoSkip:false
                    }
                },

                y:
                {
                    ticks:
                    {
                        callback:value=>
                            value.toLocaleString("es-AR")
                    }
                }

            }

        }

    });
}


crearGrafico();

</script>

{% endblock %}
