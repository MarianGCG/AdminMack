{% extends "base.html" %}
{% load l10n %}
{% block content %}

<div class="titulo-grafico">
    Evolución Facturación en USD
</div>

<style>
.barra-controles {
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:6px;
    font-size:13px;
}
.grupo {
    display:flex;
    align-items:center;
    gap:6px;
    padding-right:14px;
    border-right:1px solid #ddd;
}
.grupo:last-child {
    border-right:none;
}
.contenedor-grafico {
    height: calc(100vh - 140px);
    width:100%;
}
</style>


<form method="get" class="barra-controles">

    <div class="grupo">
        <b>Periodo:</b>
        <label><input type="radio" name="tipo" value="mensual" {% if tipo == "mensual" %}checked{% endif %}>Mensual</label>
        <label><input type="radio" name="tipo" value="trimestral" {% if tipo == "trimestral" %}checked{% endif %}>Trimestral</label>
        <label><input type="radio" name="tipo" value="anual" {% if tipo == "anual" %}checked{% endif %}>Anual</label>
    </div>

    <div class="grupo">
        <b>Modo:</b>
        <label><input type="radio" name="modo" value="lineas" {% if modo == "lineas" %}checked{% endif %}>Líneas</label>
        <label><input type="radio" name="modo" value="barras" {% if modo == "barras" %}checked{% endif %}>Barras</label>
    </div>

    <div class="grupo">
        <label>
            <input type="checkbox" name="desglose" value="1" {% if desglose %}checked{% endif %}>
            Desglose aseguradoras
        </label>
    </div>

    <div class="grupo">
        <b>Años:</b>
        {% for anio in anios_disponibles %}
            <label>
                <input type="checkbox" name="anio"
                       value="{{ anio|unlocalize }}"
                       {% if anio in anios_seleccionados %}checked{% endif %}>
                {{ anio|unlocalize }}
            </label>
        {% endfor %}
    </div>

    <div class="grupo">
        <button type="submit"
                style="padding:3px 10px;background:#2c78be;color:white;border:none;border-radius:4px;cursor:pointer;">
            Actualizar
        </button>
    </div>

</form>


<div id="legend-container" style="font-size:12px;margin-bottom:8px;"></div>

<div class="contenedor-grafico">
    <canvas id="grafico"></canvas>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = {{ labels|safe }};
const datasets = {{ datasets|safe }};
const tipo = "{{ tipo }}";
const modo = "{{ modo }}";
const desglose = {{ desglose|yesno:"true,false" }};

let chart = null;


// =============================
// FORMATEAR LABELS
// =============================

function formatearLabel(label)
{
    if(tipo==="mensual")
    {
        const mes = label.split("-")[1];
        const nombres = ["Ene","Feb","Mar","Abr","May","Jun",
                         "Jul","Ago","Sep","Oct","Nov","Dic"];
        return nombres[parseInt(mes)-1];
    }

    if(tipo==="trimestral")
        return label.split("-")[1];

    return label;
}


// =============================
// LINEAS CAMBIO AÑO
// =============================

const lineasCambioAnio = {
    id:"lineasCambioAnio",
    afterDraw(chart)
    {
        const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
        ctx.save();
        ctx.strokeStyle="#888";
        ctx.lineWidth=1;
        ctx.setLineDash([6,6]);

        for(let i=1;i<labels.length;i++)
        {
            const anioActual=labels[i].split("-")[0];
            const anioAnterior=labels[i-1].split("-")[0];

            if(anioActual!==anioAnterior)
            {
                const xPos=(x.getPixelForValue(i)+x.getPixelForValue(i-1))/2;
                ctx.beginPath();
                ctx.moveTo(xPos,top);
                ctx.lineTo(xPos,bottom);
                ctx.stroke();
            }
        }
        ctx.restore();
    }
};


// =============================
// ETIQUETAS AÑO ABAJO
// =============================

const etiquetasAnios = {
    id:"etiquetasAnios",
    afterDraw(chart)
    {
        if(tipo==="anual") return;

        const {ctx,chartArea,scales:{x}}=chart;
        ctx.save();
        ctx.font="bold 11px Arial";
        ctx.fillStyle="#444";
        ctx.textAlign="center";

        let anioActual=null;
        let inicio=0;

        for(let i=0;i<labels.length;i++)
        {
            const anio=labels[i].split("-")[0];
            const siguiente=labels[i+1]?.split("-")[0];

            if(anioActual===null)
            {
                anioActual=anio;
                inicio=i;
            }

            if(anio!==siguiente)
            {
                const xInicio=x.getPixelForValue(inicio);
                const xFin=x.getPixelForValue(i);
                const centro=(xInicio+xFin)/2;
                ctx.fillText(anioActual,centro,chartArea.bottom+18);

                anioActual=siguiente;
                inicio=i+1;
            }
        }
        ctx.restore();
    }
};

Chart.register(lineasCambioAnio, etiquetasAnios);


// =============================
// CREAR GRAFICO
// =============================

function crearGrafico()
{
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("grafico"), {

        type: modo==="barras" ? "bar" : "line",

        data: {
            labels: labels,
            datasets: datasets
        },

        options: {

            responsive:true,
            maintainAspectRatio:false,

            interaction: desglose
                ? { mode: undefined }
                : { mode:"index", intersect:false },

            plugins: {

                tooltip: { enabled: !desglose },

                legend: {
                    display: !desglose,
                    labels:{ font:{ size:11 } }
                }
            },

            scales: {

                x: {
                    ticks:{
                        font:{ size:11 },
                        callback:(value,index)=>formatearLabel(labels[index]),
                        maxRotation:0,
                        autoSkip:false
                    }
                },

                y: {
                    ticks:{
                        font:{ size:11 },
                        callback:value=>value.toLocaleString("es-AR")
                    }
                }
            }
        }
    });

    if(desglose)
        generarLeyendaAgrupada(chart);
}


// =============================
// LEYENDA AGRUPADA
// =============================

function generarLeyendaAgrupada(chart)
{
    const container=document.getElementById("legend-container");
    container.innerHTML="";

    const grupos={};

    chart.data.datasets.forEach((ds,index)=>{
        const grupo=ds.grupo || "Sin Grupo";
        if(!grupos[grupo]) grupos[grupo]=[];
        grupos[grupo].push({index,ds});
    });

    Object.keys(grupos).sort().forEach(grupo=>{

        const div=document.createElement("div");

        const titulo=document.createElement("strong");
        titulo.innerText=grupo+" ";
        titulo.style.cursor="pointer";

        titulo.onclick=()=>{
            grupos[grupo].forEach(item=>{
                const meta=chart.getDatasetMeta(item.index);
                meta.hidden = meta.hidden===null ? true : null;
            });
            chart.update();
        };

        div.appendChild(titulo);

        grupos[grupo].forEach(item=>{
            const span=document.createElement("span");
            span.innerText="  "+item.ds.label;
            span.style.cursor="pointer";
            span.style.marginRight="12px";
            span.style.color=item.ds.borderColor;

            span.onclick=()=>{
                const meta=chart.getDatasetMeta(item.index);
                meta.hidden = meta.hidden===null ? true : null;
                chart.update();
            };

            div.appendChild(span);
        });

        container.appendChild(div);
    });
}

crearGrafico();

</script>

{% endblock %}
