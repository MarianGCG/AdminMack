{% extends "base.html" %}
{% load l10n %}
{% block content %}

<div class="titulo-grafico">
    Evolución Facturación en USD
</div>

<style>

.barra-opciones {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
}

.btn {
    padding: 3px 10px;
    background: #2c78be;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 14px;
}

.btn.activo {
    background: #174a7c;
}

.btn:hover {
    background: #1f5d96;
}

.contenedor-grafico {
    background-color: white;
    padding: 12px 14px 14px 14px;
    border-radius: 8px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

/* controles en una línea */
.fila-controles {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 8px;
    font-size: 14px;
}

.checkbox-anio {
    margin-right: 8px;
}

button {
    padding: 3px 10px;
    font-size: 14px;
    cursor: pointer;
    background: #2c78be;
    color: white;
    border: none;
    border-radius: 4px;
}

button:hover {
    background: #1f5d96;
}

/* gráfico grande */
.area-grafico {
    height: calc(100vh - 210px);
}

.area-grafico canvas {
    width: 100% !important;
    height: 100% !important;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<!-- Tipo período -->
<div class="barra-opciones">

    <a href="?tipo=mensual&modo={{ modo }}"
       class="btn {% if tipo == 'mensual' %}activo{% endif %}">
        Mensual
    </a>

    <a href="?tipo=trimestral&modo={{ modo }}"
       class="btn {% if tipo == 'trimestral' %}activo{% endif %}">
        Trimestral
    </a>

    <a href="?tipo=anual&modo={{ modo }}"
       class="btn {% if tipo == 'anual' %}activo{% endif %}">
        Anual
    </a>

</div>


<!-- Tipo gráfico -->
<div class="barra-opciones">

    <a href="?tipo={{ tipo }}&modo=lineas{% for a in anios_seleccionados %}&anio={{ a }}{% endfor %}"
       class="btn {% if modo == 'lineas' %}activo{% endif %}">
        Líneas
    </a>

    <a href="?tipo={{ tipo }}&modo=barras{% for a in anios_seleccionados %}&anio={{ a }}{% endfor %}"
       class="btn {% if modo == 'barras' %}activo{% endif %}">
        Barras
    </a>

</div>


<div class="contenedor-grafico">

<form method="get">

<input type="hidden" name="tipo" value="{{ tipo }}">
<input type="hidden" name="modo" value="{{ modo }}">

<div class="fila-controles">

<strong>Años:</strong>

{% for anio in anios_disponibles %}

<label class="checkbox-anio">

<input type="checkbox"
       name="anio"
       value="{{ anio|unlocalize }}"
       {% if anio in anios_seleccionados %}checked{% endif %}>

{{ anio|unlocalize }}

</label>

{% endfor %}

<button type="submit">Actualizar</button>

</div>

</form>


<div class="area-grafico">
<canvas id="grafico"></canvas>
</div>

</div>


<script>

const labels = {{ labels|safe }};
const valoresUSD = {{ valores_usd|safe }};
const valoresDolar = {{ valores_dolar|safe }};
const tendenciaUSD = {{ valores_usd_tendencia|safe }};

const tipo = "{{ tipo }}";
const modo = "{{ modo }}";


// ==========================
// formatear etiquetas eje X
// ==========================

function formatearLabel(label) {

    if (tipo === "mensual") {

        const mes = parseInt(label.split("-")[1]);

        const nombresMes = [
            "Ene","Feb","Mar","Abr","May","Jun",
            "Jul","Ago","Sep","Oct","Nov","Dic"
        ];

        return nombresMes[mes - 1];
    }

    if (tipo === "trimestral") {

        const partes = label.split("-");
        const anio = partes[0];
        const trimestre = partes[1];

        if (trimestre === "T1")
            return anio + " " + trimestre;

        return trimestre;
    }

    return label;
}


// ==========================
// datasets
// ==========================

let datasets = [

{
label: "Facturación USD",
data: valoresUSD,
backgroundColor: "rgba(44,120,190,0.6)",
borderColor: "#2c78be",
borderWidth: 2,
tension: 0.25,
yAxisID: "y"
},

{
label: "Dólar cierre de mes",
data: valoresDolar,
type: "line",
borderColor: "orange",
borderWidth: 2,
borderDash: [6,6],
pointRadius: 3,
tension: 0.25,
yAxisID: "y1"
}

];

if (tipo === "trimestral") {

datasets.push({

label: "Tendencia",
data: tendenciaUSD,
type: "line",
borderColor: "#2ca02c",
borderWidth: 3,
borderDash: [10,5],
pointRadius: 0,
tension: 0,
yAxisID: "y"

});

}


// ==========================
// gráfico
// ==========================

new Chart(document.getElementById('grafico'), {

type: modo === "barras" ? "bar" : "line",

data: {
labels: labels,
datasets: datasets
},

options: {

responsive: true,
maintainAspectRatio: false,

interaction: {
mode: "index",
intersect: false
},

plugins: {

tooltip: {
callbacks: {
label: function(context) {

let value = context.raw;

return context.dataset.label +
": " +
value.toLocaleString("es-AR");

}
}
}

},

scales: {

x: {
ticks: {
callback: (value, index) =>
formatearLabel(labels[index]),
maxRotation: 0
}
},

y: {
position: "left",
ticks: {
callback: value =>
value.toLocaleString("es-AR")
}
},

y1: {
position: "right",
grid: { drawOnChartArea: false },
ticks: {
callback: value =>
value.toLocaleString("es-AR")
}
}

}

}

});

</script>

{% endblock %}
