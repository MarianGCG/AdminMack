{% extends "base.html" %}
{% load l10n %}
{% block content %}

<div class="titulo-grafico">
    Evolución Facturación en USD
</div>


<style>

.barra-controles {
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:6px;
    font-size:13px;
}

.grupo {
    display:flex;
    align-items:center;
    gap:6px;
    padding-right:14px;
    border-right:1px solid #ddd;
}

.grupo:last-child {
    border-right:none;
}

.contenedor-grafico {
    height: calc(100vh - 140px);
    width:100%;
}

</style>



<form method="get" class="barra-controles">


    <!-- PERIODO -->
    <div class="grupo">

        <b>Periodo:</b>

        <label>
            <input type="radio" name="tipo" value="mensual"
            {% if tipo == "mensual" %}checked{% endif %}>
            Mensual
        </label>

        <label>
            <input type="radio" name="tipo" value="trimestral"
            {% if tipo == "trimestral" %}checked{% endif %}>
            Trimestral
        </label>

        <label>
            <input type="radio" name="tipo" value="anual"
            {% if tipo == "anual" %}checked{% endif %}>
            Anual
        </label>

    </div>



    <!-- MODO -->
    <div class="grupo">

        <b>Modo:</b>

        <label>
            <input type="radio" name="modo" value="lineas"
            {% if modo == "lineas" %}checked{% endif %}>
            Líneas
        </label>

        <label>
            <input type="radio" name="modo" value="barras"
            {% if modo == "barras" %}checked{% endif %}>
            Barras
        </label>

    </div>



    <!-- DESGLOSE -->
    <div class="grupo">

        <label>
            <input type="checkbox"
                   name="desglose"
                   value="1"
                   {% if desglose %}checked{% endif %}>
            Desglose aseguradoras
        </label>

    </div>



    <!-- AÑOS -->
    <div class="grupo">

        <b>Años:</b>

        {% for anio in anios_disponibles %}

            <label>

                <input type="checkbox"
                       name="anio"
                       value="{{ anio|unlocalize }}"
                       {% if anio in anios_seleccionados %}checked{% endif %}>

                {{ anio|unlocalize }}

            </label>

        {% endfor %}

    </div>



    <!-- BOTON -->
    <div class="grupo">

        <button type="submit"
                style="
                padding:3px 10px;
                background:#2c78be;
                color:white;
                border:none;
                border-radius:4px;
                cursor:pointer;">

            Actualizar

        </button>

    </div>


</form>



<div class="contenedor-grafico">

    <canvas id="grafico"></canvas>

</div>




<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = {{ labels|safe }};
const datasets = {{ datasets|safe }};
const tipo = "{{ tipo }}";
const modo = "{{ modo }}";

let chart = null;



// =============================
// FORMATEAR LABELS
// =============================

function formatearLabel(label,index)
{

    if(tipo==="mensual")
    {
        const [anio,mes]=label.split("-");

        const nombres=[
            "Ene","Feb","Mar","Abr","May","Jun",
            "Jul","Ago","Sep","Oct","Nov","Dic"
        ];

        return nombres[parseInt(mes)-1];
    }

    if(tipo==="trimestral")
    {
        const [anio,t]=label.split("-");
        return t;
    }

    return label;
}



// =============================
// LINEAS CAMBIO AÑO
// =============================

const lineasCambioAnio =
{
    id:"lineasCambioAnio",

    afterDraw(chart)
    {
        const {ctx,chartArea:{top,bottom},scales:{x}}=chart;

        ctx.save();

        ctx.strokeStyle="#888";
        ctx.lineWidth=1;
        ctx.setLineDash([6,6]);

        for(let i=1;i<labels.length;i++)
        {
            const anioActual=labels[i].split("-")[0];
            const anioAnterior=labels[i-1].split("-")[0];

            if(anioActual!==anioAnterior)
            {
                const xPos=(x.getPixelForValue(i)+x.getPixelForValue(i-1))/2;

                ctx.beginPath();
                ctx.moveTo(xPos,top);
                ctx.lineTo(xPos,bottom);
                ctx.stroke();
            }
        }

        ctx.restore();
    }
};

Chart.register(lineasCambioAnio);



// =============================
// CREAR GRAFICO
// =============================

function crearGrafico()
{

    if(chart)
        chart.destroy();

    chart = new Chart(
        document.getElementById("grafico"),
        {

            type: modo==="barras" ? "bar" : "line",

            data:
            {
                labels: labels,
                datasets: datasets
            },

            options:
            {

                responsive:true,
                maintainAspectRatio:false,

                layout:
                {
                    padding:
                    {
                        top:10
                    }
                },

                interaction:
                {
                    mode:"index",
                    intersect:false
                },

                plugins:
                {
                    legend:
                    {
                        display:true,
                        labels:
                        {
                            font:
                            {
                                size:11
                            }
                        }
                    }
                },

                scales:
                {

                    x:
                    {
                        ticks:
                        {
                            font:
                            {
                                size:11
                            },

                            callback:(value,index)=>
                                formatearLabel(labels[index]),

                            maxRotation:0,
                            autoSkip:false
                        }
                    },

                    y:
                    {
                        ticks:
                        {
                            font:
                            {
                                size:11
                            },

                            callback:value=>
                                value.toLocaleString("es-AR")
                        }
                    }

                }

            }

        }
    );

}


crearGrafico();

</script>


{% endblock %}
