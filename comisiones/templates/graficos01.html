{% extends "base.html" %}
{% load l10n %}
{% block content %}

<div class="titulo-grafico">
    Evolución Facturación en USD
</div>

<style>
.barra-controles {
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:6px;
    font-size:13px;
}
.grupo {
    display:flex;
    align-items:center;
    gap:6px;
    padding-right:14px;
    border-right:1px solid #ddd;
}
.grupo:last-child {
    border-right:none;
}
.contenedor-grafico {
    height: calc(100vh - 140px);
    width:100%;
}
</style>

<form method="get" class="barra-controles">

    <div class="grupo">
        <b>Periodo:</b>
        <label><input type="radio" name="tipo" value="mensual" {% if tipo == "mensual" %}checked{% endif %}>Mensual</label>
        <label><input type="radio" name="tipo" value="trimestral" {% if tipo == "trimestral" %}checked{% endif %}>Trimestral</label>
        <label><input type="radio" name="tipo" value="anual" {% if tipo == "anual" %}checked{% endif %}>Anual</label>
    </div>

    <div class="grupo">
        <b>Modo:</b>
        <label><input type="radio" name="modo" value="lineas" {% if modo == "lineas" %}checked{% endif %}>Líneas</label>
        <label><input type="radio" name="modo" value="barras" {% if modo == "barras" %}checked{% endif %}>Barras</label>
    </div>

    <div class="grupo">
        <label>
            <input type="checkbox" name="desglose" value="1" onchange="this.form.submit();" {% if desglose %}checked{% endif %}>
            Desglose aseguradoras
        </label>
    </div>

    <div class="grupo">
        <b>Años:</b>
        {% for anio in anios_disponibles %}
            <label>
                <input type="checkbox" name="anio"
                       value="{{ anio|unlocalize }}"
                       {% if anio in anios_seleccionados %}checked{% endif %}>
                {{ anio|unlocalize }}
            </label>
        {% endfor %}
    </div>

    <div class="grupo">
        <button type="submit"
                style="padding:3px 10px;background:#2c78be;color:white;border:none;border-radius:4px;cursor:pointer;">
            Actualizar
        </button>
    </div>

</form>

<div id="legend-container" style="font-size:12px;margin-bottom:8px;"></div>

<div class="contenedor-grafico">
    <canvas id="grafico"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = {{ labels|safe }};
const datasets = {{ datasets|safe }};
const tipo = "{{ tipo }}";
const modo = "{{ modo }}";
const desglose = {{ desglose|yesno:"true,false" }};

let chart = null;


// =============================
// FORMATEAR LABELS
// =============================

function formatearLabel(label)
{
    if(tipo==="mensual")
    {
        const mes = label.split("-")[1];
        const nombres = ["Ene","Feb","Mar","Abr","May","Jun",
                         "Jul","Ago","Sep","Oct","Nov","Dic"];
        return nombres[parseInt(mes)-1];
    }

    if(tipo==="trimestral")
        return label.split("-")[1];

    return label;
}


// =============================
// VALORES EN TODOS LOS TIPOS
// =============================

const mostrarValores = {
    id: "mostrarValores",

    afterDatasetsDraw(chart)
    {
        const { ctx } = chart;

        chart.data.datasets.forEach((dataset, datasetIndex) => {

            const meta = chart.getDatasetMeta(datasetIndex);
            if (!meta || meta.hidden) return;

            meta.data.forEach((element, index) => {

                const value = dataset.data[index];
                if (!value || value === 0) return;

                ctx.save();
                ctx.font = "bold 10px Arial";
                ctx.fillStyle = "#000";
                ctx.textAlign = "center";

                ctx.fillText(
                    Math.round(value).toLocaleString("es-AR"),
                    element.x,
                    element.y - 6
                );

                ctx.restore();
            });
        });
    }
};


// =============================
// NOMBRE CORTO EN DESGLOSE
// =============================

const mostrarNombreEnLinea = {
    id: "mostrarNombreEnLinea",

    afterDatasetsDraw(chart)
    {
        if(!desglose) return;

        const { ctx } = chart;

        chart.data.datasets.forEach((dataset, datasetIndex) => {

            const meta = chart.getDatasetMeta(datasetIndex);
            if (!meta || meta.hidden || meta.data.length === 0) return;

            const firstElement = meta.data[0];
            if(!firstElement) return;

            let nombre = dataset.label;
            if(nombre.length > 6)
                nombre = nombre.substring(0,6);

            ctx.save();
            ctx.font = "bold 11px Arial";
            ctx.fillStyle = "#000";
            ctx.textAlign = "right";

            ctx.fillText(
                nombre,
                firstElement.x - 8,
                firstElement.y
            );

            ctx.restore();
        });
    }
};


// =============================
// LINEAS CAMBIO AÑO
// =============================

const lineasCambioAnio = {
    id:"lineasCambioAnio",
    afterDraw(chart)
    {
        if(tipo==="anual") return;

        const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
        ctx.save();
        ctx.strokeStyle="#888";
        ctx.setLineDash([6,6]);

        for(let i=1;i<labels.length;i++)
        {
            const anioActual=labels[i].split("-")[0];
            const anioAnterior=labels[i-1].split("-")[0];

            if(anioActual!==anioAnterior)
            {
                const xPos=(x.getPixelForValue(i)+x.getPixelForValue(i-1))/2;
                ctx.beginPath();
                ctx.moveTo(xPos,top);
                ctx.lineTo(xPos,bottom);
                ctx.stroke();
            }
        }
        ctx.restore();
    }
};

Chart.register(lineasCambioAnio, mostrarValores, mostrarNombreEnLinea);


// =============================
// CREAR GRAFICO
// =============================

function crearGrafico()
{
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("grafico"), {

        type: modo==="barras" ? "bar" : "line",

        data: {
            labels: labels,
            datasets: datasets
        },

        options: {

            responsive:true,
            maintainAspectRatio:false,

            interaction: tipo==="mensual"
                ? { mode: desglose ? "nearest" : "index", intersect:false }
                : false,

            plugins: {

                tooltip: {
                    enabled: tipo==="mensual"
                },

                legend: {
                    display: !desglose,
                    labels:{ font:{ size:11 } }
                }
            },

            scales: {

                x: {
                    ticks:{
                        font:{ size:11 },
                        callback:(value,index)=>formatearLabel(labels[index]),
                        maxRotation:0,
                        autoSkip:false
                    }
                },

                y: {
                    ticks:{
                        font:{ size:11 },
                        callback:value=>value.toLocaleString("es-AR")
                    }
                }
            }
        }
    });

    if(desglose)
        generarLeyendaAgrupada(chart);
}


// =============================
// LEYENDA AGRUPADA
// =============================

function generarLeyendaAgrupada(chart)
{
    const container = document.getElementById("legend-container");
    container.innerHTML = "";

    const grupos = {};

    chart.data.datasets.forEach((ds,index)=>{
        const grupo = ds.grupo || "Sin Grupo";

        if(!grupos[grupo])
            grupos[grupo] = [];

        grupos[grupo].push({ index, ds });
    });

    Object.keys(grupos).sort().forEach(grupo=>{

        const divGrupo = document.createElement("div");
        divGrupo.style.marginBottom = "6px";

        const titulo = document.createElement("strong");
        titulo.innerText = grupo;
        titulo.style.cursor = "pointer";
        titulo.style.marginRight = "12px";
        titulo.dataset.grupo = grupo;

        titulo.onclick = ()=>{
            let ocultar = false;

            grupos[grupo].forEach(item=>{
                const meta = chart.getDatasetMeta(item.index);
                if(meta.hidden !== true)
                    ocultar = true;
            });

            grupos[grupo].forEach(item=>{
                const meta = chart.getDatasetMeta(item.index);
                meta.hidden = ocultar ? true : null;
            });

            chart.update();
            actualizarEstilos();
        };

        divGrupo.appendChild(titulo);

        grupos[grupo].forEach(item=>{

            const span = document.createElement("span");

            let nombre = item.ds.label;
            if(nombre.length > 8)
                nombre = nombre.substring(0,8);
            nombre = nombre.padEnd(8," ");

            span.innerText = nombre;

            span.style.display = "inline-block";
            span.style.width = "90px";
            span.style.textAlign = "center";
            span.style.fontFamily = "monospace";
            span.style.marginRight = "6px";
            span.style.cursor = "pointer";
            span.style.color = "black";
            span.style.backgroundColor = item.ds.borderColor;
            span.style.borderRadius = "4px";
            span.style.padding = "2px 6px";

            span.dataset.index = item.index;
            span.dataset.grupo = grupo;

            span.onclick = ()=>{
                const meta = chart.getDatasetMeta(item.index);
                meta.hidden = meta.hidden === null ? true : null;
                chart.update();
                actualizarEstilos();
            };

            divGrupo.appendChild(span);
        });

        container.appendChild(divGrupo);
    });

    actualizarEstilos();

    function actualizarEstilos()
    {
        const gruposEstado = {};

        container.querySelectorAll("span[data-index]").forEach(span=>{

            const meta = chart.getDatasetMeta(span.dataset.index);

            span.style.textDecoration = meta.hidden ? "line-through" : "none";
            span.style.opacity = meta.hidden ? "0.4" : "1";

            const grupo = span.dataset.grupo;

            if(!gruposEstado[grupo])
                gruposEstado[grupo] = [];

            gruposEstado[grupo].push(meta.hidden);
        });

        container.querySelectorAll("strong[data-grupo]").forEach(titulo=>{

            const grupo = titulo.dataset.grupo;
            const estados = gruposEstado[grupo] || [];

            const todosOcultos = estados.length > 0 && estados.every(e=>e===true);

            titulo.style.textDecoration = todosOcultos ? "line-through" : "none";
            titulo.style.opacity = todosOcultos ? "0.4" : "1";
        });
    }
}

crearGrafico();

</script>

{% endblock %}
