{% extends "base.html" %}

{% block content %}

<style>




.tabla-listado{
width:650px;
table-layout:fixed;
}

.tabla-listado th:nth-child(1),
.tabla-listado td:nth-child(1){
width:100px;
}

.tabla-listado th:nth-child(2),
.tabla-listado td:nth-child(2){
width:320px;
}

.tabla-listado th:nth-child(3),
.tabla-listado td:nth-child(3){
width:80px;
text-align:center;
}

.tabla-listado th:nth-child(4),
.tabla-listado td:nth-child(4){
width:70px;
text-align:center;
}

#tabla tbody tr{
cursor:pointer;
}




/* PANEL LATERAL */

.panel-editar{
position:fixed;
right:-380px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:1000;
}

.panel-editar.abierto{
right:0;
}

.panel-editar label{
display:block;
margin-top:10px;
font-weight:bold;
}

.panel-editar input,
.panel-editar select{
width:220px;
padding:4px;
margin-top:3px;
border:1px solid #ccc;
border-radius:4px;
}

.panel-editar h3{
margin-top:0;
border-bottom:1px solid #ddd;
padding-bottom:8px;
}


th{
cursor:pointer;
user-select:none;
}

.flecha{
margin-left:6px;
font-size:11px;
color:#666;
}


.icono-editar{
cursor:pointer;
font-size:18px;
margin-right:8px;
}

.icono-eliminar{
cursor:pointer;
font-size:18px;
}

.acciones{
display:flex;
align-items:center;
gap:10px;
}


.tabla-listado th:nth-child(4),
.tabla-listado td:nth-child(4){
width:70px;
text-align:center;
}

</style>



<h2>MEDIOS de PAGO</h2>


<div style="margin-bottom:12px;">

<button onclick="nuevoRegistro()"
style="padding:6px 14px;background:#174a7c;color:white;border:none;border-radius:6px;">
➕ Nuevo
</button>

</div>



<table class="tabla-listado" id="tabla">

<thead>
<tr>
<th onclick="ordenarTabla(0,this)">Código </th>
<th onclick="ordenarTabla(1,this)">Nombre </th>
<th>Activa</th>
<th>Acciones</th>
</tr>
</thead>





<tbody>

{% for c in medios_pago %}

<tr onclick="editarRegistro(
'{{ c.id }}',
'{{ c.codigo }}',
'{{ c.nombre|escapejs }}',
'{{ c.activo|yesno:"1,0" }}'
)">

<td>{{ c.codigo }}</td>
<td>{{ c.nombre }}</td>

<td>
{% if c.activo %}
    Sí
{% else %}
    No
{% endif %}
</td>

<td class="acciones">

<span
onclick="event.stopPropagation(); editarRegistro(
'{{ c.id }}',
'{{ c.codigo }}',
'{{ c.nombre|escapejs }}',
'{{ c.activo|yesno:"1,0" }}'
)"
class="icono-editar">
✏️
</span>

<span
onclick="event.stopPropagation(); eliminarMedioPago('{{ c.id }}')"
class="icono-eliminar">
🗑
</span>

</td>

</tr>

{% endfor %}

</tbody>








</table>



<script>

function nuevoRegistro(){

    document.getElementById("edit_id").value = "";
    document.getElementById("edit_codigo").value = "";
    document.getElementById("edit_nombre").value = "";
    document.getElementById("edit_activo").checked = true;

    document.getElementById("panelEditar").classList.add("abierto");
}


function editarRegistro(id,codigo,nombre,activo){

    document.getElementById("edit_id").value = id;
    document.getElementById("edit_codigo").value = codigo;
    document.getElementById("edit_nombre").value = nombre;
    document.getElementById("edit_activo").checked = (activo=="1");

    document.getElementById("panelEditar").classList.add("abierto");
}


function cerrarPanel(){

document.getElementById("panelEditar").classList.remove("abierto")

}



function getCookie(name) {

let cookieValue = null;

if (document.cookie && document.cookie !== '') {

let cookies = document.cookie.split(';');

for (let i = 0; i < cookies.length; i++) {

let cookie = cookies[i].trim();

if (cookie.substring(0, name.length + 1) === (name + '=')) {

cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
break;

}

}

}

return cookieValue;

}




function eliminarMedioPago(id){

    if(!confirm("¿Eliminar este medio de pago?")){
        return;
    }

    fetch("/finanzas/medio_pago-eliminar/" + id + "/")
    .then(response => response.json())
    .then(data => {
        if(data.ok){
            location.reload();
        }
    });

}



function guardarRegistro(){

    let id = document.getElementById("edit_id").value;
    let codigo = document.getElementById("edit_codigo").value;
    let nombre = document.getElementById("edit_nombre").value;
    let activo = document.getElementById("edit_activo").checked;

    
    fetch("{% url 'medio_pago_guardar' %}", {
        method: "POST",

        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken":getCookie("csrftoken")
        },

        body: JSON.stringify({

            id:id,
            codigo:codigo,
            nombre:nombre,
            activo:activo

        })

    })

    .then(response => response.json())
    .then(data => {

        if(data.ok){
            location.reload();
        }else{
            alert("No se pudo guardar");
        }

    });

}
let direccionOrden = {}



function ordenarTabla(columna, th){

let tabla = document.getElementById("tabla")
let tbody = tabla.tBodies[0]
let filas = Array.from(tbody.rows)

if(!direccionOrden[columna]){
    direccionOrden[columna] = 1
}else{
    direccionOrden[columna] *= -1
}

filas.sort(function(a,b){

let A = a.cells[columna].innerText.trim()
let B = b.cells[columna].innerText.trim()

let numA = parseFloat(A.replace(",","."))
let numB = parseFloat(B.replace(",","."))

if(!isNaN(numA) && !isNaN(numB)){
    return (numA - numB) * direccionOrden[columna]
}

return A.localeCompare(B) * direccionOrden[columna]

})

filas.forEach(function(f){
tbody.appendChild(f)
})

/* limpiar flechas */
document.querySelectorAll("#tabla th").forEach(h=>{
h.innerHTML = h.innerHTML.replace(" ▲","").replace(" ▼","")
})

/* poner flecha */
if(direccionOrden[columna] == 1){
th.innerHTML = th.innerHTML + " <span class='flecha'>▲</span>"
}else{
th.innerHTML = th.innerHTML + " <span class='flecha'>▼</span>"
}

}

</script>




<div id="panelEditar" class="panel-editar">


<h3>MEDIOS de PAGO</h3>
<input type="hidden" id="edit_id">
<label>Código</label>
<input type="text" id="edit_codigo">

<label>Nombre</label>
<input type="text" id="edit_nombre">


<label>
    <input type="checkbox" id="edit_activo">
    Activa
</label>

<br><br>

<button onclick="guardarRegistro()">💾 Guardar</button>
<button onclick="cerrarPanel()">Cerrar</button>

</div>

{% endblock %}
